
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJIN COMM. ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Gulim font fallback for the order document */
        .font-gulim { font-family: 'Gulim', 'Dotum', 'AppleGothic', sans-serif; }
        .font-bold-print { font-weight: 700 !important; }
        .font-normal-print { font-weight: 400 !important; }
        
        .info-row {
            min-height: 28px;
            display: flex;
            align-items: center;
        }
        
        @media print {
            body { background: white; }
            aside, header, button { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; }
            .bg-white { box-shadow: none !important; border: none !important; }
            .no-print { display: none !important; }
        }

        /* Landscape optimization for mobile */
        @media (orientation: landscape) and (max-height: 500px) {
            header { height: 3rem !important; }
            main { padding: 0.5rem !important; }
            .stat-card-container { gap: 0.5rem !important; }
            h2 { font-size: 1.25rem !important; }
            .category-section { space-y: 1rem !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
</body>
</html>
